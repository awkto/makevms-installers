name: "ACME.sh Certs"
description: "Install acme.sh and issue Let's Encrypt certificates via DNS verification (Azure or DigitalOcean)"
category: "Services"

variables:
  domain:
    description: "FQDN for the certificate"
    vm_field: fqdn
  email_address:
    description: "ACME account email address"
  dns_provider:
    description: "DNS provider for verification"
    options:
      - label: "Azure DNS"
        value: "azure"
      - label: "DigitalOcean"
        value: "digitalocean"
    default: "azure"
  install_target:
    description: "Where to install certs"
    options:
      - label: "Nginx"
        value: "nginx"
        path: "/etc/nginx/ssl/<domain>"
      - label: "GitLab"
        value: "gitlab"
        path: "/etc/gitlab/ssl"
      - label: "General"
        value: "general"
        path: "/etc/ssl/<domain>"
    default: "general"
  issue_wildcard:
    description: "Also issue wildcard certificate (*.domain)"
    type: "boolean"
    default: "false"
  acme_server:
    description: "ACME server URL"
    default: "https://acme-v02.api.letsencrypt.org/directory"
  renewal_days:
    description: "Certificate renewal threshold in days"
    default: "30"
  force_renewal:
    description: "Force renewal even if certificate is still valid"
    type: "boolean"
    default: "false"
  azure_subscription:
    description: "Azure Subscription ID"
    group: azure_spn
    group_label: "Azure Service Principal"
    json_key: subscriptionId
    show_when: { dns_provider: "azure" }
    default: ""
  azure_tenant:
    description: "Azure AD Tenant ID"
    group: azure_spn
    group_label: "Azure Service Principal"
    json_key: tenantId
    show_when: { dns_provider: "azure" }
    default: ""
  azure_client_id:
    description: "Azure SPN Client ID"
    group: azure_spn
    group_label: "Azure Service Principal"
    json_key: clientId
    show_when: { dns_provider: "azure" }
    default: ""
  azure_secret:
    description: "Azure SPN Client Secret"
    secret: true
    group: azure_spn
    group_label: "Azure Service Principal"
    json_key: clientSecret
    show_when: { dns_provider: "azure" }
    default: ""
  do_api_key:
    description: "DigitalOcean API token"
    secret: true
    show_when: { dns_provider: "digitalocean" }
    default: ""
