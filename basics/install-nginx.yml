---
- name: Install Nginx
  hosts: target_vm
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create site configuration
      copy:
        dest: "/etc/nginx/sites-available/{{ server_name }}"
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ document_root }};
              index index.html index.htm;

              location / {
                  try_files $uri $uri/ =404;
              }

              access_log /var/log/nginx/{{ server_name }}.access.log;
              error_log /var/log/nginx/{{ server_name }}.error.log;
          }
      when: server_name is defined and server_name != ""

    - name: Enable site
      file:
        src: "/etc/nginx/sites-available/{{ server_name }}"
        dest: "/etc/nginx/sites-enabled/{{ server_name }}"
        state: link
      when: server_name is defined and server_name != ""
      notify: Reload Nginx

    - name: Create document root
      file:
        path: "{{ document_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
      when: document_root is defined and document_root != "/var/www/html"

    - name: Enable and start Nginx
      systemd:
        name: nginx
        enabled: yes
        state: started

    - name: Verify Nginx is running
      command: nginx -v
      register: nginx_version
      changed_when: false

    - name: Display Nginx version
      debug:
        msg: "{{ nginx_version.stderr }}"

  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
