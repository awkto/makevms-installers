---
- name: Install Nginx
  hosts: target_vm
  become: yes

  tasks:
    # ── Install nginx ─────────────────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Enable and start Nginx
      systemd:
        name: nginx
        enabled: yes
        state: started

    # ── Optional: Create Reverse Proxy ───────────────────────────────
    - name: Ensure SSL certificate directory exists
      file:
        path: "/etc/nginx/ssl/{{ site_fqdn }}"
        state: directory
        mode: "0755"
      when: create_reverse_proxy | bool and enable_ssl | bool

    - name: Generate self-signed certificate if not present
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /etc/nginx/ssl/{{ site_fqdn }}/key.pem
        -out /etc/nginx/ssl/{{ site_fqdn }}/fullchain.pem
        -subj "/CN={{ site_fqdn }}"
      args:
        creates: "/etc/nginx/ssl/{{ site_fqdn }}/fullchain.pem"
      when: create_reverse_proxy | bool and enable_ssl | bool

    - name: Create reverse proxy site config (HTTP only)
      copy:
        dest: "/etc/nginx/sites-available/{{ site_name }}"
        content: |
          server {
              listen 80;
              server_name {{ site_fqdn }};

              location / {
                  proxy_pass http://{{ proxy_target }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
        mode: "0644"
      when: create_reverse_proxy | bool and not enable_ssl | bool

    - name: Create reverse proxy site config (HTTPS with HTTP redirect)
      copy:
        dest: "/etc/nginx/sites-available/{{ site_name }}"
        content: |
          server {
              listen 80;
              server_name {{ site_fqdn }};
              return 301 https://$server_name$request_uri;
          }

          server {
              listen 443 ssl;
              server_name {{ site_fqdn }};

              ssl_certificate     /etc/nginx/ssl/{{ site_fqdn }}/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/{{ site_fqdn }}/key.pem;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         HIGH:!aNULL:!MD5;

              location / {
                  proxy_pass http://{{ proxy_target }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
        mode: "0644"
      when: create_reverse_proxy | bool and enable_ssl | bool

    - name: Enable site
      file:
        src: "/etc/nginx/sites-available/{{ site_name }}"
        dest: "/etc/nginx/sites-enabled/{{ site_name }}"
        state: link
      when: create_reverse_proxy | bool

    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false
      when: create_reverse_proxy | bool

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
      when: create_reverse_proxy | bool
