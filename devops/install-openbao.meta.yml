name: "Install OpenBao"
description: "Install OpenBao secrets manager in dev mode with persistent file storage, web UI, and auto-start on reboot"
category: "DevOps"

variables:
  openbao_version:
    description: "OpenBao version to install (from GitHub releases)"
    default: "2.5.1"
  openbao_listen_address:
    description: "Address and port for OpenBao to listen on"
    default: "0.0.0.0:8200"
  openbao_root_token:
    description: "Dev mode root token (used to authenticate)"
    default: "root"
    secret: true
