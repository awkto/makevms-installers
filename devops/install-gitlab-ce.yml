---
- name: Install GitLab
  hosts: target_vm
  become: yes

  vars:
    _pkg_name: "{{ gitlab_edition | default('gitlab-ce') }}"
    _pkg_version: "{{ gitlab_version | default('') }}"
    _pkg_full: "{{ _pkg_name + '=' + _pkg_version if _pkg_version else _pkg_name }}"
    _protocol: "{{ 'https' if enable_ssl | default(false) | bool else 'http' }}"
    _external_url: "{{ _protocol }}://{{ gitlab_fqdn }}"

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - openssh-server
          - ca-certificates
          - tzdata
          - perl
          - postfix
        state: present
        update_cache: yes

    - name: Check if GitLab is already installed
      stat:
        path: /opt/gitlab
      register: gitlab_installed

    - name: Add GitLab repository
      shell: |
        curl -fsSL https://packages.gitlab.com/install/repositories/gitlab/{{ _pkg_name }}/script.deb.sh | bash
      when: not gitlab_installed.stat.exists

    - name: Install GitLab
      environment:
        EXTERNAL_URL: "{{ _external_url }}"
      apt:
        name: "{{ _pkg_full }}"
        state: present
      when: not gitlab_installed.stat.exists

    - name: Configure external URL
      lineinfile:
        path: /etc/gitlab/gitlab.rb
        regexp: "^external_url "
        line: "external_url '{{ _external_url }}'"
      notify: Reconfigure GitLab

    - name: Configure SSL certificates
      blockinfile:
        path: /etc/gitlab/gitlab.rb
        marker: "# {mark} MANAGED BY MAKEVMS - SSL"
        block: |
          nginx['ssl_certificate'] = "/etc/gitlab/ssl/{{ gitlab_fqdn }}.crt"
          nginx['ssl_certificate_key'] = "/etc/gitlab/ssl/{{ gitlab_fqdn }}.key"
      when: enable_ssl | default(false) | bool
      notify: Reconfigure GitLab

    - name: Configure SMTP (optional)
      blockinfile:
        path: /etc/gitlab/gitlab.rb
        marker: "# {mark} MANAGED BY MAKEVMS - SMTP"
        block: |
          gitlab_rails['smtp_enable'] = true
          gitlab_rails['smtp_address'] = "{{ smtp_server }}"
          gitlab_rails['smtp_port'] = {{ smtp_port }}
          gitlab_rails['smtp_user_name'] = "{{ smtp_user }}"
          gitlab_rails['smtp_password'] = "{{ smtp_password }}"
          gitlab_rails['smtp_domain'] = "{{ smtp_domain }}"
          gitlab_rails['smtp_authentication'] = "login"
          gitlab_rails['smtp_enable_starttls_auto'] = true
          gitlab_rails['gitlab_email_from'] = "{{ gitlab_email_from }}"
      when: smtp_server is defined and smtp_server != ""
      notify: Reconfigure GitLab

    - name: Display initial root password location
      debug:
        msg: >
          GitLab ({{ _pkg_name }}) installed at {{ _external_url }}.
          Initial root password: cat /etc/gitlab/initial_root_password
          (expires after 24 hours)

  handlers:
    - name: Reconfigure GitLab
      command: gitlab-ctl reconfigure
