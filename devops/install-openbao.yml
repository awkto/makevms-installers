---
- name: Install OpenBao
  hosts: target_vm
  become: yes

  vars:
    _openbao_deb_url: "https://github.com/openbao/openbao/releases/download/v{{ openbao_version }}/openbao_{{ openbao_version }}_linux_amd64.deb"

  tasks:
    - name: Check if OpenBao is already installed
      command: bao version
      register: bao_check
      changed_when: false
      failed_when: false

    - name: Download OpenBao .deb package
      get_url:
        url: "{{ _openbao_deb_url }}"
        dest: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        mode: "0644"
      when: bao_check.rc != 0

    - name: Install OpenBao .deb package
      apt:
        deb: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        state: present
      when: bao_check.rc != 0

    - name: Clean up .deb file
      file:
        path: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        state: absent

    - name: Create OpenBao configuration
      copy:
        dest: /etc/openbao/config.hcl
        content: |
          ui = {{ openbao_ui_enabled }}

          listener "tcp" {
            address     = "{{ openbao_listen_address }}"
            tls_disable = {{ openbao_tls_disable }}
          }

          storage "file" {
            path = "{{ openbao_storage_path }}"
          }

          api_addr = "{{ openbao_api_addr }}"
        owner: openbao
        group: openbao
        mode: "0640"
      notify: Restart OpenBao

    - name: Create storage directory
      file:
        path: "{{ openbao_storage_path }}"
        state: directory
        owner: openbao
        group: openbao
        mode: "0750"

    - name: Enable and start OpenBao
      systemd:
        name: openbao
        enabled: yes
        state: started

    - name: Verify installation
      command: bao version
      register: bao_version
      changed_when: false

    - name: Display status
      debug:
        msg: >
          {{ bao_version.stdout }} installed.
          Access at {{ openbao_api_addr }}.
          Initialize with: bao operator init

  handlers:
    - name: Restart OpenBao
      systemd:
        name: openbao
        state: restarted
