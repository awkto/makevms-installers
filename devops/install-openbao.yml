---
- name: Install and Configure OpenBao
  hosts: target_vm
  become: yes

  vars:
    _openbao_deb_url: "https://github.com/openbao/openbao/releases/download/v{{ openbao_version }}/openbao_{{ openbao_version }}_linux_amd64.deb"
    _storage_path: "/opt/openbao/data"
    _listen_port: "{{ openbao_listen_address.split(':')[1] | default('8200') }}"
    _keys_file: "/opt/openbao/init-keys.json"
    _dev_mode: "{{ dev_mode | default('true') | bool }}"

  tasks:
    # ── Install ────────────────────────────────────────────────────────
    - name: Check if OpenBao is already installed
      command: bao version
      register: bao_check
      changed_when: false
      failed_when: false

    - name: Download OpenBao .deb package
      get_url:
        url: "{{ _openbao_deb_url }}"
        dest: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        mode: "0644"
      when: bao_check.rc != 0

    - name: Install OpenBao .deb package
      apt:
        deb: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        state: present
      when: bao_check.rc != 0

    - name: Clean up .deb file
      file:
        path: "/tmp/openbao_{{ openbao_version }}_linux_amd64.deb"
        state: absent

    # ── Configure ──────────────────────────────────────────────────────
    - name: Create openbao system user
      user:
        name: openbao
        system: yes
        shell: /usr/sbin/nologin
        home: /opt/openbao
        create_home: no
      register: openbao_user

    - name: Create storage directory
      file:
        path: "{{ _storage_path }}"
        state: directory
        owner: openbao
        group: openbao
        mode: "0750"

    - name: Create config directory
      file:
        path: /etc/openbao
        state: directory
        owner: openbao
        group: openbao
        mode: "0750"

    - name: Write OpenBao server configuration
      copy:
        dest: /etc/openbao/config.hcl
        content: |
          # OpenBao server with persistent file storage
          # Managed by MakeVMs — edit freely, service restart applies changes

          ui = true

          listener "tcp" {
            address     = "{{ openbao_listen_address }}"
            tls_disable = true
          }

          storage "file" {
            path = "{{ _storage_path }}"
          }

          api_addr = "http://{{ openbao_listen_address }}"
        owner: openbao
        group: openbao
        mode: "0640"
      notify: Restart OpenBao

    - name: Write auto-unseal script
      copy:
        dest: /opt/openbao/unseal.sh
        owner: openbao
        group: openbao
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          # Auto-unseal OpenBao on service start using the stored init key.
          # Does nothing if the keys file is missing (first-boot init not yet run).
          KEYS_FILE="{{ _keys_file }}"
          BAO_ADDR="http://127.0.0.1:{{ _listen_port }}"
          export BAO_ADDR

          [[ -f "$KEYS_FILE" ]] || exit 0

          KEY=$(python3 -c "import json; d=json.load(open('$KEYS_FILE')); print(d['unseal_keys_b64'][0])")

          for i in $(seq 1 15); do
              if /usr/bin/bao operator unseal "$KEY" >/dev/null 2>&1; then
                  exit 0
              fi
              sleep 1
          done
      when: _dev_mode

    # ── Systemd service ───────────────────────────────────────────────
    - name: Check if .deb provided a service file
      stat:
        path: /usr/lib/systemd/system/openbao.service
      register: deb_service

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/openbao.service
        content: |
          [Unit]
          Description=OpenBao Secret Management
          Documentation=https://openbao.org/docs/
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=openbao
          Group=openbao
          ExecStart=/usr/bin/bao server -config=/etc/openbao/config.hcl
          {% if _dev_mode %}ExecStartPost=/opt/openbao/unseal.sh
          {% endif %}ExecReload=/bin/kill --signal HUP $MAINPID
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536
          LimitMEMLOCK=infinity
          Environment=HOME=/opt/openbao

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      when: not deb_service.stat.exists
      notify: Reload and Restart OpenBao

    - name: Ensure override directory exists
      file:
        path: /etc/systemd/system/openbao.service.d
        state: directory
        mode: "0755"
      when: deb_service.stat.exists

    - name: Override .deb service for server mode with auto-unseal
      copy:
        dest: /etc/systemd/system/openbao.service.d/override.conf
        content: |
          [Unit]
          ConditionFileNotEmpty=

          [Service]
          Type=simple
          EnvironmentFile=
          ExecStart=
          ExecStart=/usr/bin/bao server -config=/etc/openbao/config.hcl
          {% if _dev_mode %}ExecStartPost=
          ExecStartPost=/opt/openbao/unseal.sh
          {% endif %}Environment=HOME=/opt/openbao
        mode: "0644"
      when: deb_service.stat.exists
      notify: Reload and Restart OpenBao

    - name: Enable and start OpenBao
      systemd:
        name: openbao
        enabled: yes
        state: started
        daemon_reload: yes

    # ── First-time init & unseal ───────────────────────────────────────
    - name: Wait for OpenBao to accept connections
      uri:
        url: "http://127.0.0.1:{{ _listen_port }}/v1/sys/health"
        status_code: [200, 429, 501, 503]
      register: health
      retries: 15
      delay: 2
      until: health.status is defined

    - name: Check if OpenBao has already been initialized
      stat:
        path: "{{ _keys_file }}"
      register: init_keys_stat

    - name: Initialize OpenBao (first run only)
      command: >
        bao operator init
        -key-shares=1
        -key-threshold=1
        -format=json
      register: bao_init_result
      environment:
        BAO_ADDR: "http://127.0.0.1:{{ _listen_port }}"
      when: not init_keys_stat.stat.exists
      no_log: true

    - name: Save init keys to disk
      copy:
        dest: "{{ _keys_file }}"
        content: "{{ bao_init_result.stdout }}"
        owner: openbao
        group: openbao
        mode: "0600"
      when: not init_keys_stat.stat.exists

    - name: Unseal OpenBao after initialization
      shell: |
        KEY=$(python3 -c "import json; d=json.load(open('{{ _keys_file }}')); print(d['unseal_keys_b64'][0])")
        bao operator unseal "$KEY"
      environment:
        BAO_ADDR: "http://127.0.0.1:{{ _listen_port }}"
      when: not init_keys_stat.stat.exists
      no_log: true

    # ── Verify ─────────────────────────────────────────────────────────
    - name: Wait for OpenBao to be unsealed
      uri:
        url: "http://127.0.0.1:{{ _listen_port }}/v1/sys/health"
        status_code: [200]
      register: health_final
      retries: 10
      delay: 2
      until: health_final.status == 200

    - name: Get version
      command: bao version
      register: bao_version
      changed_when: false

    - name: Read stored init keys
      slurp:
        src: "{{ _keys_file }}"
      register: stored_keys_raw
      no_log: true

    - name: Display status
      debug:
        msg: |
          {{ bao_version.stdout }}
          UI:         http://{{ openbao_listen_address }}
          Root Token: {{ (stored_keys_raw.content | b64decode | from_json).root_token }}
          Keys file:  {{ _keys_file }}
          Storage:    {{ _storage_path }}
          Mode:       {% if _dev_mode %}Dev (auto-unseals on reboot){% else %}Server (manual unseal required after reboot){% endif %}

          To use the CLI:
            export BAO_ADDR=http://{{ openbao_listen_address }}
            export BAO_TOKEN={{ (stored_keys_raw.content | b64decode | from_json).root_token }}
            bao status
          {% if not _dev_mode %}
          To unseal after a reboot:
            bao operator unseal $(python3 -c "import json; print(json.load(open('{{ _keys_file }}'))['unseal_keys_b64'][0])")
          {% endif %}

  handlers:
    - name: Restart OpenBao
      systemd:
        name: openbao
        state: restarted

    - name: Reload and Restart OpenBao
      systemd:
        name: openbao
        daemon_reload: yes
        state: restarted
