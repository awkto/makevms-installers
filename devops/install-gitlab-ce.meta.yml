name: "Install GitLab"
description: "Install GitLab Community or Enterprise Edition with optional SMTP configuration"
category: "DevOps"

variables:
  gitlab_edition:
    description: "GitLab edition to install"
    default: "gitlab-ce"
    options:
      - label: "Community Edition"
        value: "gitlab-ce"
      - label: "Enterprise Edition"
        value: "gitlab-ee"
  gitlab_version:
    description: "Version to install (e.g. 17.6.1-ce.0 for CE, 17.6.1-ee.0 for EE). Leave empty for latest."
    default: ""
  gitlab_fqdn:
    description: "Fully qualified domain name for GitLab"
    vm_field: fqdn
  enable_ssl:
    description: "Enable HTTPS using certificates from /etc/gitlab/ssl/ (run acme.sh installer first)"
    type: "boolean"
    default: "false"
  smtp_server:
    description: "SMTP server address (leave empty to skip SMTP setup)"
    default: ""
  smtp_port:
    description: "SMTP server port"
    default: "587"
  smtp_user:
    description: "SMTP username"
    default: ""
  smtp_password:
    description: "SMTP password"
    secret: true
    default: ""
  smtp_domain:
    description: "SMTP domain"
    default: ""
  gitlab_email_from:
    description: "GitLab 'from' email address"
    default: ""
