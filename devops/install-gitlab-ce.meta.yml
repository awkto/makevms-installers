name: "Install GitLab CE"
description: "Install GitLab Community Edition with optional SMTP configuration"
category: "DevOps"

variables:
  gitlab_fqdn:
    description: "Fully qualified domain name for GitLab"
  enable_ssl:
    description: "Enable HTTPS using certificates from /etc/gitlab/ssl/ (run acme.sh installer first)"
    type: "boolean"
    default: "false"
  smtp_server:
    description: "SMTP server address (leave empty to skip SMTP setup)"
    default: ""
  smtp_port:
    description: "SMTP server port"
    default: "587"
  smtp_user:
    description: "SMTP username"
    default: ""
  smtp_password:
    description: "SMTP password"
    secret: true
    default: ""
  smtp_domain:
    description: "SMTP domain"
    default: ""
  gitlab_email_from:
    description: "GitLab 'from' email address"
    default: ""
